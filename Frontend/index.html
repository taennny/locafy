<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="index.css" />
    <!-- Leaflet for Map (no API key needed) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
  </head>
  <body>
    <header>
      <nav class="topnav">
        <div class="title">FoodyGo</div>
      </nav>
      <div class="subtitle">
        1단계에 지도와 상세 패널을 추가했습니다. 백엔드
        <code>/api/recommendations</code>, <code>/api/place/:id</code>를
        사용합니다.
      </div>
    </header>

    <div class="container">
      <section class="card" aria-labelledby="search-title">
        <h2 id="search-title" class="sr-only">검색 설정</h2>
        <div class="grid cols">
          <div>
            <label for="q">검색어</label>
            <input id="q" type="text" placeholder="예) 강남 파스타" />
          </div>
          <div>
            <label for="radius">반경(m)</label>
            <input
              id="radius"
              type="number"
              min="100"
              max="5000"
              step="50"
              value="1500"
            />
          </div>
          <div>
            <label for="minRating">최소 평점</label>
            <select id="minRating">
              <option value="0">제한 없음</option>
              <option value="3.5">3.5+</option>
              <option value="4">4.0+</option>
              <option value="4.5">4.5+</option>
            </select>
          </div>
          <div>
            <label class="inline" for="minReviews">최소 리뷰수</label>
            <input id="minReviews" type="number" min="0" step="10" value="0" />
          </div>
          <div>
            <label for="openNow">지금 영업중</label>
            <select id="openNow">
              <option value="false" selected>무관</option>
              <option value="true">영업중만</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="useLocation" class="btn secondary" type="button">
              현재 위치 사용
            </button>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="searchBtn" class="btn" type="button">검색</button>
          </div>
        </div>
        <div id="locHint" class="hint" style="margin-top: 8px">
          위치 미설정: 브라우저 권한 허용 후 <b>현재 위치 사용</b>을 눌러주세요.
        </div>
      </section>

      <!-- Map Section -->
      <section
        class="card"
        aria-labelledby="map-title"
        style="margin-top: 12px"
      >
        <h2 id="map-title" class="sr-only">지도</h2>
        <div id="map" role="region" aria-label="추천 결과 지도"></div>
      </section>

      <!-- Detail Panel -->
      <aside
        id="detailPanel"
        class="panel"
        aria-live="polite"
        aria-labelledby="detail-title"
      >
        <header>
          <h3 id="detail-title">상세 정보</h3>
          <button class="close" id="detailClose">닫기</button>
        </header>
        <div id="detailBody" class="body"></div>
      </aside>

      <section class="results" aria-live="polite" aria-busy="false">
        <div id="status"></div>
        <div id="list"></div>
        <div class="footer">
          <div class="hint">
            백엔드 엔드포인트: <code>/api/recommendations</code>,
            <code>/api/place/:id</code>
          </div>
          <div class="pagination">
            <button id="prev" class="btn secondary" disabled>이전</button>
            <button id="next" class="btn secondary" disabled>다음</button>
          </div>
        </div>
      </section>
    </div>
    <script src="index.js"></script>
  </body>
</html>
