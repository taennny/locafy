<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>LOCAFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <nav class="topnav" role="navigation" aria-label="상단바">
      <div class="nav-inner">
        <div class="title">LOCAFY</div>
      </div>
    </nav>

    <form id="searchForm" autocomplete="off">
      <label>
        키워드
        <input id="q" placeholder="예: 맛집, 카페, 라멘" required />
      </label>

      <label>
        반경(m)
        <input id="radius" type="number" min="1" max="50000" value="1500" />
      </label>

      <label>
        최소 평점
        <input
          id="min_rating"
          type="number"
          step="0.1"
          min="0"
          max="5"
          value="3.5"
        />
      </label>

      <label>
        최소 리뷰 수
        <input id="min_reviews" type="number" min="0" value="20" />
      </label>

      <button type="submit">검색</button>
    </form>

    <div class="results" id="results" aria-live="polite"></div>

    <div id="review-modal-overlay" class="rm-overlay" aria-hidden="true"></div>

    <div
      id="review-modal"
      class="rm-dialog"
      role="dialog"
      aria-labelledby="review-dialog-title"
      aria-modal="true"
      aria-hidden="true"
    >
      <div class="rm-card" data-scroll="paper">
        <header class="rm-header">
          <h2 id="review-dialog-title">리뷰</h2>
          <button class="rm-close" aria-label="닫기">&times;</button>
        </header>

        <section id="review-dialog-content" class="rm-content" tabindex="-1">
          <div class="rm-empty">로딩 중...</div>
        </section>

        <footer class="rm-actions">
          <button class="rm-secondary" data-action="cancel">닫기</button>
        </footer>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
