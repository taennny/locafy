<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>LOCAFY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
     <link rel="stylesheet" href="index.css" />
  </head>
  <body>
      <nav class="topnav">
        <div clas="nav-inner">
        <div class="title">LOCAFY</div>
      </nav>

    <form id="searchForm">
      <label>
        키워드
        <input id="q" placeholder="예: 맛집, 카페, 라멘" required />
      </label>

      <label>
        반경(m)
        <input id="radius" type="number" min="1" max="50000" value="1500" />
      </label>

      <label>
        최소 평점
        <input
          id="min_rating"
          type="number"
          step="0.1"
          min="0"
          max="5"
          value="3.5"
        />
      </label>

      <label>
        최소 리뷰 수
        <input id="min_reviews" type="number" min="0" value="20" />
      </label>

      <button type="submit">검색</button>
    </form>

    <div class="results" id="results"></div>
     <script src="index.js"></script>
  </body>
</html>
